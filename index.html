<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Al Sat | Hızlı ve Güvenli Ticaret</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-700">ACE AL SAT</h1>
            <div class="space-x-4">

        </div>

    <header class="hero-gradient text-white py-16 px-4 text-center">

        <p class="text-xl opacity-90 mb-8">Ace Al Sat ile en hızlı ticaret deneyimi.</p>

    <section class="container mx-auto py-12 px-4">
        <h3 class="text-2xl font-bold mb-6 text-gray-800">Popüler Kategoriler</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

    <footer class="bg-gray-800 text-white py-8 text-center mt-12">
        <p>&copy; 2024 Ace Al Sat - Tüm Hakları Saklıdır.</p>
