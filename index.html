<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Al Sat | Premium Ticaret</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; color: #000; font-family: 'Inter', sans-serif; overflow-x: hidden; position: relative; }
        
        /* Arka Plan Detayı (Daha Belirgin Yapıldı) */
        .bg-watermark { 
            position: fixed; top: 15%; left: -5%; font-size: 18rem; 
            font-weight: 900; color: rgba(0,0,0,0.04); /* Görünürlük artırıldı */
            z-index: -1; pointer-events: none; user-select: none;
            transform: rotate(-10deg);
        }

        .glass-card { background: #ffffff; border: 1px solid rgba(0,0,0,0.06); transition: all 0.3s ease; position: relative; z-index: 10; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(255,255,255,0.98); backdrop-filter: blur(15px); }
        .modal-content { margin: 3% auto; width: 92%; max-width: 450px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cover-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid #f0f0f0; }
        .social-link { transition: all 0.2s ease; color: #9ca3af; }
        .social-link:hover { color: #000; transform: translateY(-2px); }
    </style>
</head>
<body class="antialiased">

    <div class="bg-watermark">ACE</div>

    <nav class="p-5 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-tighter uppercase">ACE AL SAT</h1>
        <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-md">
        <div class="mb-6">
            <h2 class="text-[11px] font-bold tracking-[0.2em] uppercase text-gray-400 mb-1">Vitrin</h2>
            <div class="h-[2px] w-8 bg-black"></div>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden shadow-sm cursor-pointer" onclick="openModal()">
            <img src="Screenshot_20260319_182330_Brawl Stars.jpg" alt="Kapak" class="cover-img">
            <div class="p-6 text-center">
                <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-md uppercase">Brawl Stars</span>
                <h3 class="text-xl font-extrabold mt-2 leading-tight uppercase italic">37K Kupa Takaslık</h3>
                
                <div class="grid grid-cols-2 gap-3 my-4">
                    <div class="bg-gray-50 py-3 rounded-xl">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Karakter</p>
                        <p class="font-bold">73</p>
                    </div>
                    <div class="bg-gray-50 py-3 rounded-xl">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Kuruluş</p>
                        <p class="font-bold">2019</p>
                    </div>
                </div>
                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Detayları Gör</p>
            </div>
        </div>

        <div class="mt-16 text-center">
            <p class="text-[10px] font-bold text-gray-300 uppercase tracking-[0.3em] mb-6">Bizi Takip Et</p>
            <div class="flex justify-center gap-8">
                <a href="https://instagram.com/acetoon2" target="_blank" class="social-link">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.919-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                </a>
            </div>
        </div>
    </main>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-xl font-bold uppercase">Hesap Detayı</h2>
                <button onclick="closeModal()" class="text-3xl text-gray-400">&times;</button>
            </div>
            <div class="space-y-3 mb-6">
                <img src="Screenshot_20260319_182330_Brawl Stars.jpg" class="rounded-2xl w-full">
                <img src="Screenshot_20260319_182340_Brawl Stars.jpg" class="rounded-2xl w-full">
            </div>
            <a href="https://wa.me/905010291556?text=Merhaba, 37K kupalı hesabınız için teklif vermek istiyorum." 
               class="block w-full bg-black text-white text-center py-5 rounded-2xl font-bold text-xs uppercase tracking-widest active:scale-95 transition-all">
                WHATSAPP TEKLİF VER
            </a>
            <div class="h-10"></div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById("myModal").style.display = "block"; document.body.style.overflow = "hidden"; }
        function closeModal() { document.getElementById("myModal").style.display = "none"; document.body.style.overflow = "auto"; }
        window.onclick = function(event) { if (event.target == document.getElementById("myModal")) { closeModal(); } }
    </script>
</body>
</html>
