<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Al Sat | Premium Ticaret</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; color: #000; font-family: 'Inter', sans-serif; }
        .ace-title { font-weight: 900; letter-spacing: -1.5px; }
        .glass-card { background: #ffffff; border: 1px solid rgba(0,0,0,0.06); transition: all 0.3s ease; }
        .glass-card:active { transform: scale(0.98); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(255,255,255,0.98); backdrop-filter: blur(15px); }
        .modal-content { margin: 3% auto; width: 92%; max-width: 450px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .cover-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body class="antialiased">

    <nav class="p-5 flex justify-between items-center bg-white border-b border-gray-100 sticky top-0 z-50">
        <h1 class="text-2xl ace-title uppercase">ACE AL SAT</h1>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Canlı</span>
            <div class="h-2 w-2 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-pulse"></div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8 max-w-md">
        <div class="mb-6">
            <h2 class="text-[11px] font-bold tracking-[0.2em] uppercase text-gray-400 mb-1">Günün Seçimi</h2>
            <div class="h-[2px] w-8 bg-black"></div>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden shadow-md cursor-pointer" onclick="openModal()">
            <img src="Screenshot_20260319_182330_Brawl Stars.jpg" alt="Kapak" class="cover-img">
            
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-md uppercase tracking-tighter">Brawl Stars</span>
                        <h3 class="text-xl font-extrabold mt-2 leading-tight uppercase italic text-gray-800">37K Kupa Takaslık</h3>
                    </div>
                    <span class="text-[10px] font-bold text-gray-300">#001</span>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6 text-center text-sm">
                    <div class="bg-gray-50 py-3 rounded-xl border border-gray-100">
                        <p class="text-[9px] uppercase text-gray-400 font-bold mb-1 italic">Karakter</p>
                        <p class="font-bold text-gray-800">73 Adet</p>
                    </div>
                    <div class="bg-gray-50 py-3 rounded-xl border border-gray-100">
                        <p class="text-[9px] uppercase text-gray-400 font-bold mb-1 italic">Yıl</p>
                        <p class="font-bold text-gray-800">2019</p>
                    </div>
                </div>

                <p class="text-center text-[10px] font-bold text-blue-500 uppercase tracking-widest">İncele & Teklif Ver</p>
            </div>
        </div>
    </main>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-xl font-extrabold uppercase tracking-tighter">Hesap Detayı</h2>
                <button onclick="closeModal()" class="text-3xl font-light text-gray-400 hover:text-black">&times;</button>
            </div>
            
            <div class="space-y-3 mb-6">
                <img src="Screenshot_20260319_182330_Brawl Stars.jpg" class="rounded-[1.5rem] shadow-sm w-full">
                <img src="Screenshot_20260319_182340_Brawl Stars.jpg" class="rounded-[1.5rem] shadow-sm w-full">
            </div>

            <div class="bg-white border border-gray-100 p-6 rounded-[2rem] mb-6 shadow-sm">
                <div class="flex justify-between border-b border-gray-50 pb-3 mb-3 text-sm">
                    <span class="text-gray-400 font-medium">Toplam Kupa</span>
                    <span class="font-bold text-gray-800 tracking-tight">37.083</span>
                </div>
                <div class="flex justify-between border-b border-gray-50 pb-3 mb-3 text-sm">
                    <span class="text-gray-400 font-medium">Karakter Sayısı</span>
                    <span class="font-bold text-gray-800">73 / 100</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-400 font-medium">Hesap Adı</span>
                    <span class="font-bold text-blue-600">MSE | GeVeZe</span>
                </div>
            </div>

            <a href="https://wa.me/905010291556?text=Merhaba,%20Ace%20Al%20Sat%20üzerindeki%2037K%20kupalı%20Brawl%20Stars%20hesabınız%20için%20teklif%20vermek%20istiyorum." 
               class="block w-full bg-black text-white text-center py-5 rounded-[1.5rem] font-bold text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-gray-900 transition-all active:scale-95">
                WHATSAPP TEKLİF VER
            </a>
            
            <div class="h-10"></div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById("myModal").style.display = "block"; document.body.style.overflow = "hidden"; }
        function closeModal() { document.getElementById("myModal").style.display = "none"; document.body.style.overflow = "auto"; }
        window.onclick = function(event) { if (event.target == document.getElementById("myModal")) { closeModal(); } }
    </script>

</body>
</html>
