<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Al Sat | Brawl Stars İlanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #000000; }
        .ace-border { border-bottom: 2px solid #000000; }
        .account-card { border: 1px solid #eaeaea; transition: all 0.3s ease; cursor: pointer; }
        .account-card:hover { border-color: #000; transform: translateY(-5px); }
        .badge { background: #000; color: #fff; padding: 2px 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border-radius: 20px; width: 95%; max-width: 500px; position: relative; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; position: absolute; top: 15px; right: 20px; }
    </style>
</head>
<body class="font-sans antialiased text-sm">

    <nav class="p-6 flex justify-center items-center">
        <h1 class="text-3xl font-black tracking-tighter ace-border pb-1">ACE AL SAT</h1>
    </nav>

    <main class="container mx-auto px-6 py-10 max-w-lg">
        <div class="mb-8 border-l-2 border-black pl-4">
            <h2 class="text-xl font-bold uppercase tracking-tight">Günün İlanı</h2>
            <p class="text-gray-400">Detaylar için karta dokun</p>
        </div>

        <div class="account-card rounded-3xl overflow-hidden shadow-sm" onclick="openModal()">
            <div class="bg-gray-100 p-2 text-center text-[10px] font-bold tracking-widest uppercase">Brawl Stars Account</div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="badge mb-2 inline-block">Takaslık</span>
                        <h3 class="text-2xl font-black italic uppercase leading-none">37K KUPA HESAP</h3>
                    </div>
                    <div class="text-right font-bold text-lg">2019</div>
                </div>
                <div class="space-y-2 mb-4">
                    <p class="text-gray-600">🏆 37.083 Kupa</p>
                    <p class="text-gray-600">👤 73 Karakter</p>
                </div>
                <p class="text-center text-xs text-blue-500 font-bold">DOKUN VE FOTOĞRAFLARI GÖR</p>
            </div>
        </div>
    </main>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 class="text-xl font-black uppercase mb-4 tracking-tighter">Hesap Detayları</h2>
            
            <div class="space-y-4 mb-6">
                <img src="Screenshot_20260319_182330_Brawl Stars.jpg" alt="Menü" class="rounded-xl w-full border border-gray-200">
                <img src="Screenshot_20260319_182340_Brawl Stars.jpg" alt="İstatistik" class="rounded-xl w-full border border-gray-200">
            </div>

            <div class="bg-gray-50 p-4 rounded-xl mb-6">
                <p class="mb-1"><b>Kupa:</b> 37.083</p>
                <p class="mb-1"><b>Karakter:</b> 73</p>
                <p class="mb-1"><b>Kuruluş:</b> 2019 (Old)</p>
                <p><b>İsim:</b> MSE | GeVeZe</p>
            </div>

            <a href="https://wa.me/905010291556" class="block w-full bg-black text-white text-center py-4 rounded-2xl font-black uppercase tracking-widest">
                WHATSAPP'TAN YAZ
            </a>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById("myModal").style.display = "block"; document.body.style.overflow = "hidden"; }
        function closeModal() { document.getElementById("myModal").style.display = "none"; document.body.style.overflow = "auto"; }
        window.onclick = function(event) { if (event.target == document.getElementById("myModal")) { closeModal(); } }
    </script>

</body>
</html>
